services:
  webapi:
    build:
      context: ..
      dockerfile: Lab10.Docker/Dockerfile
    container_name: lab10-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Переопределяем строку подключения для контейнера (имя хоста базы данных - "db")
      ConnectionStrings__SqlServerConnection: Server=db,1433;Database=LibraryDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lab10-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
